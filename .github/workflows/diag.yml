name: Host Diag (temporary)

on:
  workflow_dispatch: {}

jobs:
  diag:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Inspect Proxmox host
        env:
          AL_TEMPLATE: ${{ secrets.PROXMOX_AMAZON_LINUX_TEMPLATE_ID }}
        run: |
          echo "===== pveversion ====="; pveversion || true
          echo "===== storage status ====="; pvesm status || true
          echo "===== volume groups ====="; vgs || true
          echo "===== thin pools (lvs) ====="; lvs -a || true
          echo "===== df -h ====="; df -h || true
          echo "===== template ${AL_TEMPLATE} config ====="; qm config "$AL_TEMPLATE" || true
          echo "===== all VMs ====="; qm list || true
          echo "===== storage.cfg content lines ====="; grep -E '^\s*(dir|lvmthin|content)' /etc/pve/storage.cfg || true
