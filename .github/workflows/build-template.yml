name: Build AL2023 Cloud Template

# Bake qemu-guest-agent + a systemd-networkd DHCP fix into an Amazon Linux 2023
# template by offline-customising a full clone of a PRISTINE base template, then
# converting it to a new template. After it finishes, point the
# PROXMOX_AMAZON_LINUX_TEMPLATE_ID secret at the new VMID.
#
# src_id MUST be a pristine base image template (e.g. the original 9001), NOT the
# one the secret currently points at — the source is consumed read-only but the
# target VMID is destroyed/recreated, so src_id and new_id must differ.
on:
  workflow_dispatch:
    inputs:
      src_id:
        description: 'Source (pristine base) template VMID to clone from'
        required: true
        default: '9001'
        type: string
      new_id:
        description: 'VMID to create for the new template'
        required: true
        default: '9101'
        type: string

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 25
    steps:
      - name: Bake guest agent + DHCP fix into template
        env:
          SRC_TEMPLATE: ${{ inputs.src_id }}
          NEW_ID: ${{ inputs.new_id }}
          STORAGE: ${{ secrets.PROXMOX_STORAGE }}
        run: |
          set -euo pipefail
          STORAGE="${STORAGE:-local-lvm}"
          echo ">> Source template: $SRC_TEMPLATE  ->  new template: $NEW_ID  (storage=$STORAGE)"

          if [ "$SRC_TEMPLATE" = "$NEW_ID" ]; then
            echo "ERROR: src_id and new_id must differ (new_id is destroyed then recreated)." >&2
            exit 1
          fi

          # 1. Tooling
          if ! command -v virt-customize >/dev/null 2>&1; then
            echo ">> Installing libguestfs-tools..."
            export DEBIAN_FRONTEND=noninteractive
            # The enterprise PVE/Ceph repos 401 without a subscription and break
            # apt. Temporarily disable any source referencing them, install from
            # the Debian repos, then restore.
            DISABLED=""
            for f in $(grep -rlE "enterprise\.proxmox\.com" /etc/apt/sources.list /etc/apt/sources.list.d/ 2>/dev/null || true); do
              mv "$f" "$f.disabled" && DISABLED="$DISABLED $f"
            done
            echo ">> Temporarily disabled apt sources:${DISABLED:- none}"
            apt-get update -y
            apt-get install -y libguestfs-tools
            for f in $DISABLED; do mv "$f.disabled" "$f" 2>/dev/null || true; done
          fi

          # 2. Clean any previous attempt at NEW_ID
          if qm status "$NEW_ID" >/dev/null 2>&1; then
            echo ">> Removing existing VMID $NEW_ID"
            qm stop "$NEW_ID" >/dev/null 2>&1 || true
            qm destroy "$NEW_ID" --purge
          fi

          # 3. Full clone (writable disk we can customise)
          qm clone "$SRC_TEMPLATE" "$NEW_ID" --name al2023-qga --full --storage "$STORAGE"

          # 4. Resolve the scsi0 disk path and bake in the agent offline
          DISK_REF="$(qm config "$NEW_ID" | sed -n 's/^scsi0: \([^,]*\).*/\1/p')"
          DISK_PATH="$(pvesm path "$DISK_REF")"
          echo ">> Customising $DISK_REF ($DISK_PATH)"
          export LIBGUESTFS_BACKEND=direct
          # AL2023 ships no qemu-guest-agent in its repos and can't use EPEL,
          # but the EL9 build (AlmaLinux 9 AppStream) installs and runs on it
          # (verified on a live AL2023 instance). libguestfs classifies AL2023
          # as "unknown" so --install/--firstboot are unavailable, but
          # --run-command works and the appliance has host network, so run the
          # guest's own dnf offline. The package's %post creates the
          # virtio-serial device-activation symlink, so the agent auto-starts on
          # the Proxmox VM (which has agent: enabled=1). cloud-init clean makes
          # clones re-initialise (fresh instance-id, ssh keys, etc.).
          # NIC DHCP: this AL2023 image runs systemd-networkd, but the DHCP
          # server replies unicast and networkd doesn't latch it; RequestBroadcast
          # forces broadcast replies. Type=ether matches regardless of the NIC
          # being named eth0 or ens18, and sorting before cloud-init's
          # 10-cloud-init-eth0.network makes it authoritative.
          NETCFG='[Match]\nType=ether\n\n[Network]\nDHCP=ipv4\n\n[DHCPv4]\nRequestBroadcast=yes\n'

          virt-customize -a "$DISK_PATH" \
            --run-command "printf '[alma9-appstream]\nname=alma9-appstream\nbaseurl=https://repo.almalinux.org/almalinux/9/AppStream/x86_64/os/\nenabled=0\ngpgcheck=0\n' > /etc/yum.repos.d/alma9.repo" \
            --run-command 'dnf --enablerepo=alma9-appstream install -y qemu-guest-agent' \
            --run-command 'systemctl enable qemu-guest-agent || true' \
            --run-command 'rm -f /etc/yum.repos.d/alma9.repo' \
            --run-command "printf '${NETCFG}' > /etc/systemd/network/05-pve-dhcp.network" \
            --run-command "printf 'selinux:\n  selinux_no_reboot: true\n' > /etc/cloud/cloud.cfg.d/99-pve-no-selinux-reboot.cfg" \
            --run-command "mkdir -p /etc/ssh/sshd_config.d && printf 'PasswordAuthentication yes\n' > /etc/ssh/sshd_config.d/00-pve-password-auth.conf" \
            --run-command 'cloud-init clean --logs || true'

          # 5. Convert to template
          qm template "$NEW_ID"
          echo ">> DONE. Rebuilt template is VMID $NEW_ID."
          echo ">> Update the PROXMOX_AMAZON_LINUX_TEMPLATE_ID secret to $NEW_ID."
