name: Create Container

on:
  workflow_dispatch:
    inputs:
      template:
        description: 'Container template (ubuntu-22.04)'
        required: true
        type: choice
        options:
          - ubuntu-22.04
      vm_name:
        description: 'Container name / hostname (3–20 chars, lowercase alphanumeric + hyphens)'
        required: true
        type: string
      slack_user_id:
        description: 'Slack user ID to DM results to'
        required: true
        type: string
      cores:
        description: 'CPU cores'
        required: false
        default: '2'
        type: string
      memory:
        description: 'RAM in MB'
        required: false
        default: '2048'
        type: string
      disk_gb:
        description: 'Rootfs size in GB'
        required: false
        default: '8'
        type: string
      unprivileged:
        description: 'Unprivileged container (1) or privileged (0)'
        required: false
        default: '1'
        type: string
      onboot:
        description: 'Start on host boot (1) or not (0)'
        required: false
        default: '0'
        type: string
      note:
        description: 'Optional description / purpose note'
        required: false
        default: ''
        type: string

jobs:
  create:
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create container on Proxmox
        id: ct
        env:
          PROXMOX_NODE: ${{ secrets.PROXMOX_NODE }}
          PROXMOX_STORAGE: ${{ secrets.PROXMOX_STORAGE }}
          PROXMOX_CT_TEMPLATE_STORAGE: ${{ secrets.PROXMOX_CT_TEMPLATE_STORAGE }}
          PROXMOX_BRIDGE: ${{ secrets.PROXMOX_BRIDGE }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          chmod +x scripts/create-container.sh
          bash scripts/create-container.sh \
            "${{ inputs.template }}" \
            "${{ inputs.vm_name }}" \
            "${{ inputs.slack_user_id }}" \
            "${{ inputs.cores }}" \
            "${{ inputs.memory }}" \
            "${{ inputs.disk_gb }}" \
            "${{ inputs.unprivileged }}" \
            "${{ inputs.onboot }}" \
            "${{ inputs.note }}"

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -sf -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg ch "${{ inputs.slack_user_id }}" \
              --arg vm "${{ inputs.vm_name }}" \
              '{channel: $ch, text: (":x: Failed to create container `" + $vm + "`. Check the Actions run for details or contact an administrator.")}')"
