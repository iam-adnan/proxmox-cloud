name: Agent Check (temporary)

on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: self-hosted
    timeout-minutes: 12
    steps:
      - name: Probe guest agent on a linked clone
        env:
          AL_TEMPLATE: ${{ secrets.PROXMOX_AMAZON_LINUX_TEMPLATE_ID }}
          STORAGE: ${{ secrets.PROXMOX_STORAGE }}
        run: |
          set +e +o pipefail   # GHA runs with bash -e; we want to survive failing probes
          DBG=9200
          STORAGE="${STORAGE:-local-lvm}"
          echo ">> template=$AL_TEMPLATE debug-vmid=$DBG"

          if qm status "$DBG" >/dev/null 2>&1; then
            qm stop "$DBG" --skiplock >/dev/null 2>&1 || true
            sleep 2
            qm destroy "$DBG" --purge || true
          fi

          # Linked clone = near-instant (vs ~10 min full clone)
          qm clone "$AL_TEMPLATE" "$DBG" --name agent-dbg
          qm config "$DBG" | grep -q "cloudinit" || qm set "$DBG" --ide2 "${STORAGE}:cloudinit"
          qm set "$DBG" --ciuser ec2-user --ipconfig0 ip=dhcp
          echo "=== config ==="; qm config "$DBG" | grep -E "^(agent|net0|scsi0|ide2|ipconfig0):"
          qm start "$DBG"
          echo ">> started; polling..."

          for i in $(seq 1 30); do
            sleep 10
            qm agent "$DBG" ping >/dev/null 2>&1 && { echo "agent up after ~$((i*10))s"; break; }
          done

          gx() { echo "### $*"; qm guest exec "$DBG" -- /bin/sh -c "$*" 2>&1; echo; }
          gx 'ip -br addr'
          gx 'cloud-init --version 2>&1; cloud-init query platform 2>/dev/null; cloud-init query datasource 2>/dev/null'
          gx 'grep -rh datasource_list /etc/cloud/ 2>/dev/null'
          gx 'nmcli -t -f DEVICE,STATE,CONNECTION device 2>/dev/null; networkctl --no-pager 2>/dev/null'
          gx 'cat /run/cloud-init/result.json 2>/dev/null; ls /run/cloud-init 2>/dev/null'
          gx 'journalctl -u cloud-init-local -u cloud-init -u NetworkManager --no-pager 2>/dev/null | tail -25'

          echo "=== cleanup ==="
          qm stop "$DBG" --skiplock >/dev/null 2>&1 || true
          sleep 3
          qm destroy "$DBG" --purge || true
          echo ">> done"
