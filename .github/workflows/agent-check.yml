name: Agent Check (temporary)

on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: self-hosted
    timeout-minutes: 12
    steps:
      - name: Test NIC DHCP fix on a linked clone
        env:
          AL_TEMPLATE: ${{ secrets.PROXMOX_AMAZON_LINUX_TEMPLATE_ID }}
          STORAGE: ${{ secrets.PROXMOX_STORAGE }}
        run: |
          set +e +o pipefail   # GHA runs with bash -e; survive failing probes
          DBG=9200
          STORAGE="${STORAGE:-local-lvm}"
          echo ">> template=$AL_TEMPLATE debug-vmid=$DBG"

          if qm status "$DBG" >/dev/null 2>&1; then
            qm stop "$DBG" --skiplock >/dev/null 2>&1 || true
            sleep 2
            qm destroy "$DBG" --purge || true
          fi

          qm clone "$AL_TEMPLATE" "$DBG" --name agent-dbg
          DISK_REF="$(qm config "$DBG" | sed -n 's/^scsi0: \([^,]*\).*/\1/p')"
          DISK_PATH="$(pvesm path "$DISK_REF")"
          export LIBGUESTFS_BACKEND=direct

          # Candidate fix: a catch-all NetworkManager connection that DHCPs the
          # primary ethernet regardless of the EC2-tailored image config.
          virt-customize -a "$DISK_PATH" \
            --run-command 'mkdir -p /etc/NetworkManager/system-connections' \
            --run-command "printf '[connection]\nid=pve-dhcp\ntype=ethernet\nautoconnect=true\nautoconnect-priority=99\n\n[ipv4]\nmethod=auto\n\n[ipv6]\nmethod=auto\n' > /etc/NetworkManager/system-connections/pve-dhcp.nmconnection" \
            --run-command 'chmod 600 /etc/NetworkManager/system-connections/pve-dhcp.nmconnection'

          qm config "$DBG" | grep -q "cloudinit" || qm set "$DBG" --ide2 "${STORAGE}:cloudinit"
          qm set "$DBG" --ciuser ec2-user --ipconfig0 ip=dhcp
          qm start "$DBG"
          echo ">> started; polling for an IP..."

          for i in $(seq 1 30); do
            sleep 10
            IP=$(qm guest cmd "$DBG" network-get-interfaces 2>/dev/null | jq -r '[.[]|select(.name|test("^(eth|ens|enp)"))|.["ip-addresses"][]?|select(.["ip-address-type"]=="ipv4")|.["ip-address"]|select(test("^127.")|not)]|first // empty' 2>/dev/null)
            echo "t=$((i*10))s ip='${IP}'"
            [ -n "$IP" ] && { echo ">> GOT IP: $IP"; break; }
          done

          echo "=== final interfaces ==="
          qm guest cmd "$DBG" network-get-interfaces 2>&1 | tr -d '\n' | head -c 700; echo
          echo "=== cleanup ==="
          qm stop "$DBG" --skiplock >/dev/null 2>&1 || true
          sleep 3
          qm destroy "$DBG" --purge || true
          echo ">> done"
